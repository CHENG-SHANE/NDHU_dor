name: Keep Render App Awake

on:
  schedule:
    # 每 10 分鐘執行一次
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Web Service
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://ndhudormexchange.onrender.com
